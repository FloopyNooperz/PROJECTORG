<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Dashboard — Apex Media WI</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000000;
      --silver: #A5ACAF;
      --silver-light: #C8CDD0;
      --silver-border: rgba(165, 172, 175, 0.25);
      --white: #ffffff;
      --surface: #111111;
      --surface2: #181818;
      --text: #e8e8e8;
      --text-muted: #606060;
      --text-soft: #9a9a9a;
      --green: #5a9e78;
      --green-dim: rgba(90, 158, 120, 0.12);
      --amber: #c8943a;
      --amber-dim: rgba(200, 148, 58, 0.12);
      --blue: #4a90b8;
      --blue-dim: rgba(74, 144, 184, 0.12);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* HERO */
    .hero {
      position: relative;
      background: var(--black);
      border-bottom: 3px solid var(--silver);
      overflow: hidden;
    }

    .hero-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: repeating-linear-gradient(90deg, var(--silver) 0px, var(--silver) 40px, transparent 40px, transparent 44px);
      opacity: 0.4;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 28px 36px;
    }

    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-eyebrow::before {
      content: '';
      width: 24px;
      height: 2px;
      background: var(--silver);
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 72px);
      line-height: 0.9;
      color: var(--white);
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    /* CONTROLS */
    .controls {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 28px 36px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--silver);
    }

    .filter-btn, .sort-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid var(--silver-border);
      background: rgba(165, 172, 175, 0.06);
      color: var(--silver);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .filter-btn:hover, .sort-btn:hover {
      background: rgba(165, 172, 175, 0.15);
      border-color: rgba(165, 172, 175, 0.5);
    }

    .filter-btn.active {
      background: var(--silver);
      color: var(--black);
    }

    /* MAIN */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 28px 80px;
      position: relative;
      z-index: 1;
    }

    /* GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    /* MOBILE OPTIMIZATIONS */
    @media (max-width: 768px) {
      .hero-title {
        font-size: clamp(36px, 8vw, 56px);
      }

      .controls {
        padding: 0 16px 24px;
        gap: 8px;
      }

      .filter-group {
        gap: 6px;
        width: 100%;
      }

      .filter-group:first-child {
        order: 1;
      }

      .filter-group:last-child {
        order: 2;
        margin-left: 0;
      }

      .filter-label {
        font-size: 10px;
      }

      .filter-btn, .sort-btn {
        font-size: 10px;
        padding: 5px 10px;
      }

      .main {
        padding: 32px 16px 60px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .project-card {
        padding: 20px;
        gap: 14px;
      }

      .card-title {
        font-size: 20px;
      }

      .status-badge {
        font-size: 8px;
        padding: 4px 8px;
      }

      .info-value {
        font-size: 12px;
      }

      .card-notes {
        font-size: 11px;
      }

      .refresh-note {
        font-size: 9px;
        padding: 0 16px;
      }

      .empty-state {
        padding: 60px 20px;
      }

      .empty-state-title {
        font-size: 24px;
      }

      .empty-state p {
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      .hero-inner {
        padding: 36px 16px 28px;
      }

      .hero-eyebrow {
        font-size: 10px;
        margin-bottom: 8px;
      }

      .hero-title {
        font-size: clamp(32px, 7vw, 48px);
        margin-bottom: 16px;
      }

      .controls {
        flex-direction: column;
        padding: 0 16px 20px;
      }

      .filter-group {
        width: 100%;
        order: unset;
      }

      .filter-group:last-child {
        margin-left: 0;
      }

      .main {
        padding: 24px 12px 50px;
      }

      .projects-grid {
        gap: 12px;
      }

      .project-card {
        padding: 16px;
        gap: 12px;
      }

      .card-header {
        flex-direction: column;
        gap: 8px;
      }

      .card-title {
        font-size: 18px;
      }

      .status-badge {
        align-self: flex-start;
      }

      .card-body {
        gap: 10px;
      }

      .info-row {
        gap: 2px;
      }

      .info-label {
        font-size: 9px;
      }

      .info-value {
        font-size: 12px;
      }

      .refresh-note {
        font-size: 8px;
        padding: 0 12px;
        margin-top: 16px;
      }
    }

    /* CARD */
    .project-card {
      background: var(--surface);
      border: 1px solid rgba(165, 172, 175, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s ease;
      animation: fadeUp 0.5s ease both;
    }

    .project-card:hover {
      border-color: rgba(165, 172, 175, 0.3);
      background: var(--surface2);
      transform: translateY(-4px);
    }

    .project-card:nth-child(1) { animation-delay: 0.05s; }
    .project-card:nth-child(2) { animation-delay: 0.1s; }
    .project-card:nth-child(3) { animation-delay: 0.15s; }
    .project-card:nth-child(4) { animation-delay: 0.2s; }
    .project-card:nth-child(5) { animation-delay: 0.25s; }
    .project-card:nth-child(6) { animation-delay: 0.3s; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.05em;
      color: var(--white);
      line-height: 1.1;
    }

    .status-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 2px;
      white-space: nowrap;
    }

    .status-not-started {
      background: rgba(165, 172, 175, 0.15);
      color: var(--text-muted);
    }

    .status-in-progress {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .status-blocked {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .status-completed {
      background: var(--green-dim);
      color: var(--green);
    }

    .card-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid rgba(165, 172, 175, 0.1);
      padding-top: 12px;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .info-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .info-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
    }

    .card-footer {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(165, 172, 175, 0.1);
    }

    .card-notes {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
    }

    /* STAGE INDICATORS */
    .stage-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      display: inline-block;
      background: rgba(165, 172, 175, 0.1);
      color: var(--silver);
    }

    .stage-high {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .stage-medium {
      background: var(--blue-dim);
      color: var(--blue);
    }

    .stage-low {
      background: rgba(165, 172, 175, 0.1);
      color: var(--text-soft);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 28px;
      color: var(--text-muted);
    }

    .empty-state-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--silver);
      margin-bottom: 12px;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-style: italic;
    }

    .refresh-note {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-stripe"></div>
  <div class="hero-inner">
    <div class="hero-eyebrow">Apex Media WI</div>
    <h1 class="hero-title">Project Org</h1>
  </div>
</div>

<div class="controls">
  <div class="filter-group">
    <span class="filter-label">Status:</span>
    <button class="filter-btn active" data-status="all">All</button>
    <button class="filter-btn" data-status="Not started">Not started</button>
    <button class="filter-btn" data-status="In progress">In progress</button>
    <button class="filter-btn" data-status="Blocked">Blocked</button>
    <button class="filter-btn" data-status="Completed">Completed</button>
  </div>
  <div class="filter-group" style="margin-left: auto;">
    <span class="filter-label">Sort:</span>
    <button class="sort-btn" data-sort="name">Name</button>
    <button class="sort-btn" data-sort="deadline">Deadline</button>
    <button class="sort-btn" data-sort="stage">Priority</button>
  </div>
</div>

<div class="main">
  <div class="projects-grid" id="projectsGrid">
    <div class="loading">Loading projects...</div>
  </div>
  <div class="refresh-note">Data updates when you refresh the page. Edit your Google Sheet and refresh to see changes.</div>
</div>

<script>
  const SHEET_ID = '1tD4RISkUfn-ShwacF-IACwFrKatah5lq3_MrSbt_Pk0';
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

  let projects = [];
  let currentFilter = 'all';
  let currentSort = 'name';

  // Fetch and parse CSV
  async function fetchProjects() {
    try {
      const response = await fetch(CSV_URL);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const csv = await response.text();
      console.log('CSV fetched:', csv.substring(0, 500)); // Log first 500 chars
      console.log('CSV lines:', csv.split('\n').length);
      
      projects = parseCSV(csv);
      console.log('Parsed projects:', projects);
      
      if (projects.length === 0) {
        throw new Error('No projects found in sheet');
      }
      
      render();
    } catch (error) {
      console.error('Error fetching sheet:', error);
      document.getElementById('projectsGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-title">Unable to load projects</div>
          <p><strong>Check the browser console (F12) for debug info.</strong></p>
          <p style="margin-top: 12px; font-size: 12px; line-height: 1.8;">
            Error: ${error.message}
          </p>
        </div>
      `;
    }
  }

  function parseCSV(csv) {
    const lines = csv.trim().split('\n');
    if (lines.length < 2) return [];

    const headers = lines[0].split(',').map(h => h.trim());
    const projects = [];

    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;

      const values = line.split(',').map(v => v.trim());
      const project = {};

      headers.forEach((header, index) => {
        project[header] = values[index] || '';
      });

      if (project['Project Name']) {
        projects.push(project);
      }
    }

    return projects;
  }

  function getStatusColor(status) {
    const statusMap = {
      'Not started': 'status-not-started',
      'In progress': 'status-in-progress',
      'Blocked': 'status-blocked',
      'Completed': 'status-completed'
    };
    return statusMap[status] || 'status-not-started';
  }

  function getStageColor(stage) {
    const stageMap = {
      'High': 'stage-high',
      'Medium': 'stage-medium',
      'Low': 'stage-low'
    };
    return stageMap[stage] || 'stage-low';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    if (isNaN(date)) return dateStr;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function filterAndSort(projectList) {
    let filtered = projectList;

    // Apply status filter
    if (currentFilter !== 'all') {
      filtered = filtered.filter(p => p['Status'] === currentFilter);
    }

    // Apply sort
    filtered.sort((a, b) => {
      if (currentSort === 'name') {
        return a['Project Name'].localeCompare(b['Project Name']);
      } else if (currentSort === 'deadline') {
        const dateA = new Date(a['Due date']) || new Date(9999, 0, 0);
        const dateB = new Date(b['Due date']) || new Date(9999, 0, 0);
        return dateA - dateB;
      } else if (currentSort === 'stage') {
        const priority = { 'High': 0, 'Medium': 1, 'Low': 2 };
        return (priority[a['Stage']] || 3) - (priority[b['Stage']] || 3);
      }
      return 0;
    });

    return filtered;
  }

  function render() {
    const grid = document.getElementById('projectsGrid');
    const filtered = filterAndSort(projects);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-title">No projects</div>
          <p>Try adjusting your filters or add projects to your sheet</p>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map(project => `
      <div class="project-card">
        <div class="card-header">
          <div class="card-title">${project['Project Name']}</div>
          <span class="status-badge ${getStatusColor(project['Status'])}">${project['Status']}</span>
        </div>
        <div class="card-body">
          ${project['Client'] ? `
            <div class="info-row">
              <span class="info-label">Client</span>
              <span class="info-value">${project['Client']}</span>
            </div>
          ` : ''}
          ${project['Stage'] ? `
            <div class="info-row">
              <span class="info-label">Priority</span>
              <span class="stage-badge ${getStageColor(project['Stage'])}">${project['Stage']}</span>
            </div>
          ` : ''}
          ${project['Due date'] ? `
            <div class="info-row">
              <span class="info-label">Due Date</span>
              <span class="info-value">${formatDate(project['Due date'])}</span>
            </div>
          ` : ''}
        </div>
        ${project['Notes'] ? `
          <div class="card-footer">
            <div class="card-notes">${project['Notes']}</div>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  // Event listeners
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.status;
      render();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      currentSort = e.target.dataset.sort;
      render();
    });
  });

  // Load on page load
  fetchProjects();
</script>

</body>
</html>
